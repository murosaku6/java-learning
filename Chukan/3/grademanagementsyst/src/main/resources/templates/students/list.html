<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>学生一覧</title>
</head>

<body>
    <h1>学生一覧</h1>
    <p>
        <a th:href="@{/}">← ホームへ戻る</a>
    </p>
    <p>
        <a th:href="@{/students/new}">学生を登録する</a>
    </p>

    <table border="1">

        <tr>
            <th>ID</th>
            <th>学籍番号</th>
            <th>氏名</th>
            <th>学年</th>
            <th>クラス</th>
            <th>編集</th>
            <th>削除</th>
        </tr>

        <tr th:each="student : ${students}">
            <td th:text="${student.id}"></td>
            <td th:text="${student.studentNumber}"></td>
            <td th:text="${student.name}"></td>
            <td th:text="${student.grade}"></td>
            <td th:text="${student.className}"></td>
            <td>
                <a th:href="@{/students/edit/{id}(id=${student.id})}">
                    編集 
                </a>
            </td>
            <td>
                <a th:href="@{/students/delete/{id}(id=${student.id})}"
                onclick="return confirm('この学生を削除しますか？');">
                    削除
                </a>
            </td>
        </tr>
    </table>
</body>
</html>
